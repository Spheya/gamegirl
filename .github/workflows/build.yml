name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build Project
    runs-on: ubuntu-latest

    strategy:
      matrix:
        preset: [debug, release]

    steps:
    - uses: actions/checkout@v4

    - uses: lukka/get-cmake@latest

    - uses: KyleMayes/install-llvm-action@v2
      with:
        version: "21"

    - name: Build
      run: |
        cmake \
          --preset ${{ matrix.preset }} \
          -DCMAKE_C_COMPILER=clang \
          -DCMAKE_CXX_COMPILER=clang++ \
          -DGAMEGIRL_BUILD_TESTS=On
        cmake --build .

    - name: Run Tests
      run: ctest --test-dir build/${{ matrix.preset }}/tests
