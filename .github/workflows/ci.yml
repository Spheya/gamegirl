name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build Project
    runs-on: ubuntu-latest
    container:
      image: silkeh/clang:latest

    strategy:
      matrix:
        preset: [debug, release]

    steps:
    - uses: actions/checkout@v4

    - name: Build
      run: |
        cmake \
          --preset ${{ matrix.preset }} \
          -DCMAKE_C_COMPILER=clang \
          -DCMAKE_CXX_COMPILER=clang++ \
          -DGAMEGIRL_BUILD_TESTS=On
        cmake --build .

    - name: Run Tests
      run: ctest --test-dir build/${{ matrix.preset }}/tests
